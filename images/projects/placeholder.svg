<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <!-- subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="#181818"/>
  </pattern>
  <rect width="1600" height="900" fill="url(#dots)" opacity="0.4"/>

  <!-- notebook — left -->
  <g transform="translate(120, 200)">
    <rect x="0" y="0" width="240" height="300" rx="8" fill="#161616" stroke="#222" stroke-width="1.5"/>
    <line x1="40" y1="0" x2="40" y2="300" stroke="#1e1e1e" stroke-width="1"/>
    <line x1="58" y1="60" x2="210" y2="60" stroke="#1e1e1e" stroke-width="0.7"/>
    <line x1="58" y1="90" x2="195" y2="90" stroke="#1e1e1e" stroke-width="0.7"/>
    <line x1="58" y1="120" x2="205" y2="120" stroke="#1e1e1e" stroke-width="0.7"/>
    <line x1="58" y1="150" x2="190" y2="150" stroke="#1e1e1e" stroke-width="0.7"/>
    <line x1="58" y1="180" x2="200" y2="180" stroke="#1e1e1e" stroke-width="0.7"/>
    <circle cx="210" cy="30" r="5" fill="#2dd4bf" opacity="0.15"/>
  </g>

  <!-- pen — diagonal -->
  <g transform="translate(420, 350) rotate(-8)">
    <rect x="0" y="0" width="200" height="14" rx="2" fill="#222"/>
    <polygon points="200,0 225,7 200,14" fill="#282828"/>
    <rect x="0" y="0" width="30" height="14" rx="2" fill="#1d1d1d"/>
    <rect x="26" y="0" width="5" height="14" fill="#2a2a2a"/>
  </g>

  <!-- mug — right area -->
  <g transform="translate(1200, 150)">
    <rect x="0" y="20" width="140" height="115" rx="8" fill="#181818" stroke="#222" stroke-width="1.5"/>
    <path d="M140 45 Q185 45 185 78 Q185 110 140 110" stroke="#222" stroke-width="1.5" fill="none"/>
    <ellipse cx="70" cy="20" rx="70" ry="12" fill="#181818" stroke="#222" stroke-width="1.5"/>
    <path d="M40 -15 Q52 -38 40 -58" stroke="#222" stroke-width="1" fill="none" opacity="0.35"/>
    <path d="M70 -15 Q82 -40 70 -60" stroke="#222" stroke-width="1" fill="none" opacity="0.35"/>
  </g>

  <!-- plant — far right -->
  <g transform="translate(1350, 450)">
    <path d="M20 110 L0 55 L90 55 L70 110 Z" fill="#181818" stroke="#222" stroke-width="1.5"/>
    <rect x="-5" y="46" width="100" height="13" rx="3" fill="#181818" stroke="#222" stroke-width="1"/>
    <line x1="45" y1="46" x2="45" y2="-25" stroke="#222" stroke-width="1.8"/>
    <ellipse cx="22" cy="-12" rx="32" ry="18" fill="none" stroke="#222" stroke-width="1.2" transform="rotate(-22, 22, -12)"/>
    <ellipse cx="68" cy="-2" rx="28" ry="16" fill="none" stroke="#222" stroke-width="1.2" transform="rotate(18, 68, -2)"/>
  </g>

  <!-- small card mockup — center bottom -->
  <g transform="translate(680, 520)">
    <rect x="0" y="0" width="180" height="120" rx="10" fill="#151515" stroke="#1e1e1e" stroke-width="1"/>
    <rect x="16" y="16" width="148" height="60" rx="6" fill="#1a1a1a"/>
    <rect x="16" y="88" width="80" height="8" rx="4" fill="#1e1e1e"/>
    <rect x="16" y="102" width="60" height="6" rx="3" fill="#1a1a1a"/>
  </g>
</svg>
