<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <!-- subtle grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="#181818"/>
  </pattern>
  <rect width="1600" height="900" fill="url(#dots)" opacity="0.3"/>

  <!-- stack of books — left -->
  <g transform="translate(150, 250)">
    <rect x="0" y="80" width="200" height="30" rx="3" fill="#1a1a1a" stroke="#252525" stroke-width="1"/>
    <rect x="10" y="48" width="180" height="30" rx="3" fill="#181818" stroke="#232323" stroke-width="1"/>
    <rect x="5" y="16" width="190" height="30" rx="3" fill="#1c1c1c" stroke="#262626" stroke-width="1"/>
    <!-- bookmark -->
    <rect x="150" y="0" width="12" height="28" rx="2" fill="#2dd4bf" opacity="0.2"/>
  </g>

  <!-- pencil — diagonal across books -->
  <g transform="translate(380, 260) rotate(-12)">
    <rect x="0" y="0" width="180" height="12" rx="2" fill="#222"/>
    <polygon points="180,0 200,6 180,12" fill="#282828"/>
    <rect x="0" y="0" width="25" height="12" rx="2" fill="#1d1d1d"/>
  </g>

  <!-- laptop screen — center -->
  <g transform="translate(580, 180)">
    <rect x="0" y="0" width="320" height="210" rx="10" fill="#151515" stroke="#222" stroke-width="1.5"/>
    <rect x="14" y="14" width="292" height="175" rx="4" fill="#1a1a1a"/>
    <!-- screen content — checklist -->
    <rect x="35" y="40" width="120" height="10" rx="5" fill="#222"/>
    <rect x="35" y="65" width="16" height="16" rx="3" fill="#1e1e1e" stroke="#282828" stroke-width="1"/>
    <rect x="60" y="68" width="90" height="6" rx="3" fill="#1e1e1e"/>
    <rect x="35" y="95" width="16" height="16" rx="3" fill="#1e1e1e" stroke="#282828" stroke-width="1"/>
    <rect x="60" y="98" width="80" height="6" rx="3" fill="#1e1e1e"/>
    <rect x="35" y="125" width="16" height="16" rx="3" fill="#1e1e1e" stroke="#282828" stroke-width="1"/>
    <rect x="60" y="128" width="100" height="6" rx="3" fill="#1e1e1e"/>
    <!-- checkmark on first item -->
    <path d="M39 73 L43 77 L51 69" stroke="#2dd4bf" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- laptop base -->
    <rect x="-10" y="210" width="340" height="12" rx="2" fill="#181818" stroke="#222" stroke-width="1"/>
  </g>

  <!-- graduation cap — right -->
  <g transform="translate(1150, 220)">
    <polygon points="80,0 160,40 80,80 0,40" fill="#1a1a1a" stroke="#252525" stroke-width="1.5"/>
    <line x1="80" y1="40" x2="80" y2="100" stroke="#252525" stroke-width="1.5"/>
    <rect x="55" y="95" width="50" height="8" rx="2" fill="#181818" stroke="#222" stroke-width="1"/>
    <!-- tassel -->
    <line x1="160" y1="40" x2="175" y2="85" stroke="#252525" stroke-width="1.2"/>
    <circle cx="175" cy="88" r="4" fill="#2dd4bf" opacity="0.2"/>
  </g>

  <!-- small chat bubbles — bottom right -->
  <g transform="translate(1100, 520)">
    <rect x="0" y="0" width="160" height="50" rx="12" fill="#161616" stroke="#222" stroke-width="1"/>
    <rect x="12" y="14" width="100" height="6" rx="3" fill="#1e1e1e"/>
    <rect x="12" y="28" width="70" height="6" rx="3" fill="#1a1a1a"/>
    <rect x="40" y="58" width="140" height="50" rx="12" fill="#181818" stroke="#232323" stroke-width="1"/>
    <rect x="52" y="72" width="80" height="6" rx="3" fill="#1e1e1e"/>
    <rect x="52" y="86" width="60" height="6" rx="3" fill="#1a1a1a"/>
  </g>

  <!-- small calendar — far right -->
  <g transform="translate(1350, 380)">
    <rect x="0" y="0" width="130" height="110" rx="8" fill="#161616" stroke="#222" stroke-width="1"/>
    <rect x="0" y="0" width="130" height="28" rx="8" fill="#1a1a1a"/>
    <rect x="25" y="38" width="16" height="12" rx="2" fill="#1e1e1e"/>
    <rect x="50" y="38" width="16" height="12" rx="2" fill="#1e1e1e"/>
    <rect x="75" y="38" width="16" height="12" rx="2" fill="#1e1e1e"/>
    <rect x="25" y="58" width="16" height="12" rx="2" fill="#1e1e1e"/>
    <rect x="50" y="58" width="16" height="12" rx="2" fill="#2dd4bf" opacity="0.15"/>
    <rect x="75" y="58" width="16" height="12" rx="2" fill="#1e1e1e"/>
    <rect x="25" y="78" width="16" height="12" rx="2" fill="#1e1e1e"/>
    <rect x="50" y="78" width="16" height="12" rx="2" fill="#1e1e1e"/>
  </g>
</svg>
