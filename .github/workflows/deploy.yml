name: Deploy Portfolio

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build for staging
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main' ||
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
        run: BASE_PATH=/staging npm run build

      - name: Build for production
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
        run: npm run build

      - name: Upload staging artifact
        if: >
          github.event_name == 'push' && github.ref == 'refs/heads/main' ||
          github.event_name == 'pull_request' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
        uses: actions/upload-artifact@v4
        with:
          name: staging-site
          path: dist/

      - name: Upload production artifact
        if: >
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
        uses: actions/upload-artifact@v4
        with:
          name: production-site
          path: dist/

  deploy-staging:
    if: >
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL || format('https://{0}.github.io/staging', github.repository_owner) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
        continue-on-error: true

      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: staging-site
          path: staging/

      - name: Deploy staging to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./staging
          destination_dir: staging
          keep_files: true

  deploy-production:
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL || format('https://{0}.github.io', github.repository_owner) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
        continue-on-error: true

      - name: Download production artifact
        uses: actions/download-artifact@v4
        with:
          name: production-site
          path: production/

      - name: Deploy production to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./production
          destination_dir: .
          keep_files: false
