<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <!-- subtle grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="#181818"/>
  </pattern>
  <rect width="1600" height="900" fill="url(#dots)" opacity="0.3"/>

  <!-- map/location pin — left area -->
  <g transform="translate(180, 180)">
    <!-- map card -->
    <rect x="0" y="0" width="280" height="200" rx="12" fill="#161616" stroke="#222" stroke-width="1.5"/>
    <!-- map lines -->
    <line x1="0" y1="80" x2="280" y2="80" stroke="#1e1e1e" stroke-width="0.8"/>
    <line x1="0" y1="140" x2="280" y2="140" stroke="#1e1e1e" stroke-width="0.8"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#1e1e1e" stroke-width="0.8"/>
    <line x1="190" y1="0" x2="190" y2="200" stroke="#1e1e1e" stroke-width="0.8"/>
    <!-- pin -->
    <g transform="translate(140, 60)">
      <path d="M0 -20 C0 -35 20 -35 20 -20 C20 -5 10 10 10 10 C10 10 0 -5 0 -20Z" fill="#1c1c1c" stroke="#252525" stroke-width="1.2"/>
      <circle cx="10" cy="-20" r="5" fill="#2dd4bf" opacity="0.2"/>
    </g>
    <!-- another pin -->
    <g transform="translate(200, 100)">
      <path d="M0 -14 C0 -25 14 -25 14 -14 C14 -3 7 7 7 7 C7 7 0 -3 0 -14Z" fill="#1c1c1c" stroke="#252525" stroke-width="1"/>
      <circle cx="7" cy="-14" r="3.5" fill="#c4b5fd" opacity="0.2"/>
    </g>
  </g>

  <!-- calendar card — center -->
  <g transform="translate(600, 200)">
    <rect x="0" y="0" width="240" height="180" rx="10" fill="#161616" stroke="#222" stroke-width="1.5"/>
    <rect x="0" y="0" width="240" height="40" rx="10" fill="#1a1a1a"/>
    <!-- month text placeholder -->
    <rect x="70" y="14" width="100" height="10" rx="5" fill="#222"/>
    <!-- calendar grid -->
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="32" y="0" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="64" y="0" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="96" y="0" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="128" y="0" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="160" y="0" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="192" y="0" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="0" y="26" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="32" y="26" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="64" y="26" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="96" y="26" width="24" height="18" rx="3" fill="#fdba74" opacity="0.15"/>
      <rect x="128" y="26" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="160" y="26" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="192" y="26" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="0" y="52" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="32" y="52" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="64" y="52" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="96" y="52" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="128" y="52" width="24" height="18" rx="3" fill="#fdba74" opacity="0.15"/>
      <rect x="160" y="52" width="24" height="18" rx="3" fill="#1e1e1e"/>
      <rect x="192" y="52" width="24" height="18" rx="3" fill="#1e1e1e"/>
    </g>
  </g>

  <!-- music note — right area -->
  <g transform="translate(1100, 200)">
    <rect x="0" y="0" width="200" height="160" rx="10" fill="#161616" stroke="#222" stroke-width="1.5"/>
    <!-- waveform -->
    <g transform="translate(20, 50)">
      <rect x="0" y="20" width="4" height="30" rx="2" fill="#222"/>
      <rect x="12" y="10" width="4" height="50" rx="2" fill="#222"/>
      <rect x="24" y="15" width="4" height="40" rx="2" fill="#252525"/>
      <rect x="36" y="5" width="4" height="60" rx="2" fill="#222"/>
      <rect x="48" y="18" width="4" height="34" rx="2" fill="#252525"/>
      <rect x="60" y="8" width="4" height="54" rx="2" fill="#222"/>
      <rect x="72" y="22" width="4" height="26" rx="2" fill="#252525"/>
      <rect x="84" y="12" width="4" height="46" rx="2" fill="#222"/>
      <rect x="96" y="0" width="4" height="70" rx="2" fill="#c4b5fd" opacity="0.25"/>
      <rect x="108" y="15" width="4" height="40" rx="2" fill="#222"/>
      <rect x="120" y="20" width="4" height="30" rx="2" fill="#252525"/>
      <rect x="132" y="10" width="4" height="50" rx="2" fill="#222"/>
      <rect x="144" y="25" width="4" height="20" rx="2" fill="#252525"/>
    </g>
    <!-- play button -->
    <circle cx="100" cy="130" r="14" fill="none" stroke="#252525" stroke-width="1.2"/>
    <polygon points="95,123 95,137 108,130" fill="#252525"/>
  </g>

  <!-- ticket stub — bottom left -->
  <g transform="translate(200, 540)">
    <rect x="0" y="0" width="220" height="80" rx="8" fill="#161616" stroke="#222" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="80" stroke="#222" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="18" y="20" width="100" height="8" rx="4" fill="#1e1e1e"/>
    <rect x="18" y="38" width="70" height="6" rx="3" fill="#1a1a1a"/>
    <rect x="18" y="52" width="85" height="6" rx="3" fill="#1a1a1a"/>
    <!-- stub marks -->
    <circle cx="190" cy="30" r="8" fill="#1a1a1a" stroke="#222" stroke-width="1"/>
    <circle cx="190" cy="55" r="8" fill="#1a1a1a" stroke="#222" stroke-width="1"/>
  </g>

  <!-- phone with map — far right -->
  <g transform="translate(1350, 300)">
    <rect x="0" y="0" width="110" height="190" rx="14" fill="#151515" stroke="#222" stroke-width="1.5"/>
    <rect x="8" y="22" width="94" height="145" rx="4" fill="#1a1a1a"/>
    <!-- map on phone -->
    <line x1="8" y1="70" x2="102" y2="70" stroke="#1e1e1e" stroke-width="0.6"/>
    <line x1="8" y1="110" x2="102" y2="110" stroke="#1e1e1e" stroke-width="0.6"/>
    <line x1="40" y1="22" x2="40" y2="167" stroke="#1e1e1e" stroke-width="0.6"/>
    <line x1="75" y1="22" x2="75" y2="167" stroke="#1e1e1e" stroke-width="0.6"/>
    <!-- pin on phone -->
    <g transform="translate(50, 55)">
      <path d="M0 -10 C0 -18 12 -18 12 -10 C12 -2 6 6 6 6 C6 6 0 -2 0 -10Z" fill="#fdba74" opacity="0.25"/>
    </g>
    <rect x="38" y="175" width="34" height="4" rx="2" fill="#1e1e1e"/>
  </g>
</svg>
