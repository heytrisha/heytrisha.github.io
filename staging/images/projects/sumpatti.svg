<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <!-- subtle grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="#181818"/>
  </pattern>
  <rect width="1600" height="900" fill="url(#dots)" opacity="0.3"/>

  <!-- chart card — left -->
  <g transform="translate(140, 180)">
    <rect x="0" y="0" width="300" height="220" rx="12" fill="#161616" stroke="#222" stroke-width="1.5"/>
    <!-- chart title -->
    <rect x="20" y="20" width="120" height="10" rx="5" fill="#222"/>
    <!-- bar chart -->
    <g transform="translate(20, 60)">
      <rect x="0" y="80" width="28" height="60" rx="4" fill="#1e1e1e"/>
      <rect x="40" y="50" width="28" height="90" rx="4" fill="#1e1e1e"/>
      <rect x="80" y="30" width="28" height="110" rx="4" fill="#1e1e1e"/>
      <rect x="120" y="10" width="28" height="130" rx="4" fill="#1e1e1e"/>
      <rect x="160" y="0" width="28" height="140" rx="4" fill="#2dd4bf" opacity="0.2"/>
      <rect x="200" y="20" width="28" height="120" rx="4" fill="#1e1e1e"/>
      <rect x="240" y="40" width="28" height="100" rx="4" fill="#1e1e1e"/>
    </g>
  </g>

  <!-- line chart — center -->
  <g transform="translate(580, 220)">
    <rect x="0" y="0" width="280" height="180" rx="10" fill="#161616" stroke="#222" stroke-width="1.5"/>
    <!-- grid lines -->
    <line x1="20" y1="40" x2="260" y2="40" stroke="#1e1e1e" stroke-width="0.5"/>
    <line x1="20" y1="70" x2="260" y2="70" stroke="#1e1e1e" stroke-width="0.5"/>
    <line x1="20" y1="100" x2="260" y2="100" stroke="#1e1e1e" stroke-width="0.5"/>
    <line x1="20" y1="130" x2="260" y2="130" stroke="#1e1e1e" stroke-width="0.5"/>
    <!-- line -->
    <polyline points="20,120 60,100 100,110 140,70 180,80 220,40 260,50" stroke="#2dd4bf" stroke-width="1.5" fill="none" opacity="0.3"/>
    <!-- dots on line -->
    <circle cx="140" cy="70" r="3" fill="#2dd4bf" opacity="0.3"/>
    <circle cx="220" cy="40" r="3" fill="#2dd4bf" opacity="0.3"/>
  </g>

  <!-- wallet — right area -->
  <g transform="translate(1050, 200)">
    <rect x="0" y="0" width="240" height="160" rx="12" fill="#181818" stroke="#222" stroke-width="1.5"/>
    <rect x="0" y="0" width="240" height="50" rx="12" fill="#1a1a1a"/>
    <!-- card slots -->
    <rect x="16" y="65" width="208" height="28" rx="6" fill="#1a1a1a" stroke="#222" stroke-width="0.8"/>
    <rect x="16" y="100" width="208" height="28" rx="6" fill="#1a1a1a" stroke="#222" stroke-width="0.8"/>
    <!-- card in slot -->
    <rect x="24" y="69" width="192" height="20" rx="4" fill="#1e1e1e"/>
    <rect x="32" y="74" width="60" height="6" rx="3" fill="#252525"/>
  </g>

  <!-- coins — bottom left -->
  <g transform="translate(200, 520)">
    <ellipse cx="50" cy="30" rx="50" ry="18" fill="#1a1a1a" stroke="#252525" stroke-width="1.2"/>
    <ellipse cx="50" cy="24" rx="50" ry="18" fill="#181818" stroke="#252525" stroke-width="1.2"/>
    <ellipse cx="50" cy="18" rx="50" ry="18" fill="#161616" stroke="#222" stroke-width="1.2"/>
    <!-- inner circle on top coin -->
    <circle cx="50" cy="18" r="12" fill="none" stroke="#222" stroke-width="0.8"/>
    <!-- second stack -->
    <g transform="translate(120, 20)">
      <ellipse cx="40" cy="24" rx="40" ry="15" fill="#1a1a1a" stroke="#252525" stroke-width="1"/>
      <ellipse cx="40" cy="18" rx="40" ry="15" fill="#181818" stroke="#252525" stroke-width="1"/>
      <ellipse cx="40" cy="12" rx="40" ry="15" fill="#161616" stroke="#222" stroke-width="1"/>
    </g>
  </g>

  <!-- phone with onboarding — far right -->
  <g transform="translate(1350, 250)">
    <rect x="0" y="0" width="120" height="200" rx="16" fill="#151515" stroke="#222" stroke-width="1.5"/>
    <rect x="10" y="25" width="100" height="148" rx="5" fill="#1a1a1a"/>
    <!-- onboarding steps -->
    <circle cx="60" cy="60" r="18" fill="none" stroke="#222" stroke-width="1.2"/>
    <rect x="42" y="55" width="36" height="10" rx="5" fill="#222"/>
    <rect x="30" y="90" width="60" height="6" rx="3" fill="#1e1e1e"/>
    <rect x="38" y="102" width="44" height="6" rx="3" fill="#1a1a1a"/>
    <!-- progress dots -->
    <circle cx="42" cy="140" r="3" fill="#2dd4bf" opacity="0.3"/>
    <circle cx="54" cy="140" r="3" fill="#1e1e1e"/>
    <circle cx="66" cy="140" r="3" fill="#1e1e1e"/>
    <rect x="42" y="183" width="36" height="5" rx="2.5" fill="#1e1e1e"/>
  </g>

  <!-- pie chart — bottom center -->
  <g transform="translate(750, 520)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#222" stroke-width="1.5"/>
    <!-- slices -->
    <path d="M60 60 L60 5 A55 55 0 0 1 107 38 Z" fill="#1a1a1a" stroke="#222" stroke-width="1"/>
    <path d="M60 60 L107 38 A55 55 0 0 1 95 105 Z" fill="#181818" stroke="#222" stroke-width="1"/>
    <path d="M60 60 L95 105 A55 55 0 0 1 25 105 Z" fill="#2dd4bf" opacity="0.1" stroke="#222" stroke-width="1"/>
    <path d="M60 60 L25 105 A55 55 0 0 1 60 5 Z" fill="#161616" stroke="#222" stroke-width="1"/>
  </g>
</svg>
